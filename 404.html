<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Azka Radinka</title>
  <meta name="description" content="The page you requested could not be found.">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f4f4;
      --text-primary: #171717;
      --text-secondary: #6f6f6f;
      --hover-bg: #f5f4f4;
      --border: #e5e5e5;
      --input-bg: #ffffff;
      --input-border: #d4d4d4;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 16px;
      min-height: 100vh;
    }

    .container {
      max-width: 692px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    @media (min-width: 640px) {
      .container {
        padding: 128px 24px;
      }
    }

    @media (min-width: 768px) {
      .container {
        padding: 64px 24px;
      }
    }

    header {
      margin-bottom: 96px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    header a {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      display: inline-block;
    }

    header .subtitle {
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      color: var(--text-secondary);
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    h1 {
      font-size: 40px;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    @media (min-width: 640px) {
      h1 {
        font-size: 56px;
      }
    }

    p {
      max-width: 34rem;
      color: var(--text-secondary);
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-weight: 500;
      text-decoration: none;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .home-button:hover,
    .home-button:focus-visible {
      background-color: var(--hover-bg);
      border-color: var(--input-border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="./index.html">Azka Radinka</a>
      <span class="subtitle">Analytics Engineer</span>
    </header>

    <main>
      <span class="eyebrow">404</span>
      <h1>Page not found.</h1>
      <p>The page you were trying to open does not exist or may have been moved. Return to the homepage to keep browsing.</p>
      <a class="home-button" href="./index.html">Back to home</a>
    </main>
  </div>
</body>
</html>
