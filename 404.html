<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Azka Radinka</title>
  <meta name="description" content="The page you requested could not be found.">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Charter';
      src: url('assets/fonts/charter_regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Charter';
      src: url('assets/fonts/charter_bold.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f4ed;
      --bg-secondary: #faf9f5;
      --text-primary: #141413;
      --text-secondary: #504e49;
      --text-tertiary: #6b6a64;
      --hover-bg: #e8e6dc;
      --border: #e8e6dc;
      --brand: #1B365D;
      --brand-light: #2D5A8A;
      --input-bg: #faf9f5;
      --input-border: #e8e6dc;
      --serif: Charter, Georgia, Palatino, "Times New Roman", serif;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--serif);
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.55;
      font-size: 16px;
      font-weight: 400;
      min-height: 100vh;
    }

    .container {
      max-width: 692px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    @media (min-width: 640px) {
      .container {
        padding: 128px 24px;
      }
    }

    @media (min-width: 768px) {
      .container {
        padding: 64px 24px;
      }
    }

    header {
      margin-bottom: 96px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    header a {
      font-size: 32px;
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      text-decoration: none;
      display: inline-block;
    }

    header .subtitle {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text-secondary);
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 40px;
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.005em;
    }

    @media (min-width: 640px) {
      h1 {
        font-size: 56px;
      }
    }

    p {
      max-width: 34rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      padding: 10px 18px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--brand);
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 0 0 1px var(--border);
      transition: background-color 0.15s ease, box-shadow 0.15s ease;
    }

    .home-button:hover,
    .home-button:focus-visible {
      background-color: var(--hover-bg);
      box-shadow: 0 0 0 1px var(--brand);
    }

  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="./index.html">Azka Radinka</a>
      <span class="subtitle">Analytics Engineer</span>
    </header>

    <main>
      <span class="eyebrow">404</span>
      <h1>Page not found.</h1>
      <p>The page you were trying to open does not exist or may have been moved. Return to the homepage to keep browsing.</p>
      <a class="home-button" href="./index.html">Back to home</a>
    </main>
  </div>
</body>
</html>
